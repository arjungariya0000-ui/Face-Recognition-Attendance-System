<!DOCTYPE html>
<html>
  <head>
    <title>Attendance Records</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <h1 class="title">Attendance Records</h1>

    <table class="glass-table">
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
      </tr>

      {% for row in records %}
      <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
      </tr>
      {% endfor %}
    </table>

    <a class="btn-back" href="/">⬅ Back to Home</a>
  </body>
</html>
